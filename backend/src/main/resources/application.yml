spring:
  application:
    name: pgconnect-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/pgconnect
    username: postgres
    password: password # Replace with env variable in production
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update # Automatically update schema (useful for dev)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  
# Application specific properties
app:
  jwt:
    secret: 9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9 # Replace with secure key in prod
    expiration: 86400000 # 24 hours
